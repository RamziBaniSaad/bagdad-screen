<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hero — Baklava</title>
<link rel="stylesheet" href="styles.css">
<script src="image-slot.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #viewport { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }

  .stage {
    width: 1920px; height: 1080px; position: relative; overflow: hidden;
    transform-origin: center center;
    background: var(--bb-bordeaux, #7A2230);
    font-family: var(--font-body, 'Mulish', sans-serif);
  }

  /* Corner ornament — one large gold star, ~10% opacity, slightly cropped */
  .corner-star {
    position: absolute; top: -190px; left: -190px;
    width: 620px; height: 620px;
    color: var(--bb-goldbraun, #E0A85E);
    opacity: 0.10;
    pointer-events: none;
  }
  .corner-star svg { width: 100%; height: 100%; display: block; }

  /* Layout: text left, dominant image right */
  .grid {
    position: absolute; inset: 0;
    display: grid; grid-template-columns: 1fr 57%;
    align-items: center; gap: 86px;
    padding: 96px 104px;
  }

  .copy { display: flex; flex-direction: column; align-items: flex-start; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 22px;
    color: var(--bb-goldbraun, #E0A85E);
    font-weight: 800; font-size: 34px;
    letter-spacing: 0.26em; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .eyebrow .rule { width: 64px; height: 3px; background: currentColor; opacity: 0.7; }
  .eyebrow .star-sm { width: 30px; height: 30px; }

  .headline {
    font-family: var(--font-display, 'Amiri', serif);
    font-weight: 700; font-style: normal;
    font-size: 244px; line-height: 0.92;
    color: var(--bb-sandcreme, #F5ECDA);
    margin: 0;
  }

  .subline {
    font-weight: 500; font-size: 44px; line-height: 1.3;
    color: rgba(245, 236, 218, 0.82);
    margin-top: 26px; max-width: 18ch;
  }

  .price-wrap { margin-top: 56px; display: flex; align-items: baseline; gap: 22px; }
  .price {
    position: relative; overflow: hidden;
    font-weight: 800; font-size: 118px; line-height: 1;
    color: var(--bb-goldbraun, #E0A85E);
  }
  .price .sheen {
    position: absolute; top: -20%; left: 0; width: 55%; height: 140%;
    background: linear-gradient(105deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
    transform: translateX(-180%) skewX(-12deg);
    pointer-events: none;
  }
  .price-caption {
    font-weight: 700; font-size: 28px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(245, 236, 218, 0.7);
  }

  /* Image stage — fixed rounded frame, photo zooms within it (Ken-Burns) */
  .photo-frame {
    width: 100%; height: 880px;
    border-radius: 22px; overflow: hidden;
    box-shadow: 0 26px 70px rgba(44, 34, 24, 0.45);
    position: relative;
  }
  image-slot {
    display: block; width: 100%; height: 100%;
    transform-origin: 55% 50%;
    --slot-bg: #5C1924;
    background: #5C1924;
  }

  /* ---- Motion (transform/opacity only; reduced-motion safe) ---- */
  @media (prefers-reduced-motion: no-preference) {
    .reveal { will-change: transform; }
    .stage.play .eyebrow   { animation: fadeUp 0.7s cubic-bezier(.22,.61,.36,1) 0.15s both; }
    .stage.play .headline  { animation: fadeUp 0.7s cubic-bezier(.22,.61,.36,1) 0.30s both; }
    .stage.play .subline   { animation: fadeUp 0.7s cubic-bezier(.22,.61,.36,1) 0.45s both; }
    .stage.play .price-wrap{ animation: fadeUp 0.7s cubic-bezier(.22,.61,.36,1) 0.60s both; }

    .stage.play image-slot { animation: kenburns 24s ease-in-out 0.6s infinite alternate; }
    .stage.play .price .sheen { animation: sheen 12s ease-in-out 1.6s infinite; }
    .corner-star { animation: starPulse 8s ease-in-out infinite; }
  }

  @keyframes fadeUp {
    from { transform: translateY(34px); }
    to   { transform: translateY(0); }
  }
  @keyframes kenburns {
    from { transform: scale(1.0); }
    to   { transform: scale(1.04); }
  }
  @keyframes sheen {
    0%   { transform: translateX(-180%) skewX(-12deg); }
    9%   { transform: translateX(320%)  skewX(-12deg); }
    100% { transform: translateX(320%)  skewX(-12deg); }
  }
  @keyframes starPulse {
    0%, 100% { opacity: 0.09; }
    50%      { opacity: 0.16; }
  }
</style>
</head>
<body>
  <div id="viewport">
    <div class="stage" id="stage">
      <div class="corner-star">
        <svg viewBox="0 0 100 100"><path d="M50 2 L57.65 31.52 L83.94 16.06 L68.48 42.35 L98 50 L68.48 57.65 L83.94 83.94 L57.65 68.48 L50 98 L42.35 68.48 L16.06 83.94 L31.52 57.65 L2 50 L31.52 42.35 L16.06 16.06 L42.35 31.52 Z" fill="currentColor"/></svg>
      </div>

      <div class="grid">
        <div class="copy">
          <div class="eyebrow reveal">
            <svg class="star-sm" viewBox="0 0 100 100"><path d="M50 2 L57.65 31.52 L83.94 16.06 L68.48 42.35 L98 50 L68.48 57.65 L83.94 83.94 L57.65 68.48 L50 98 L42.35 68.48 L16.06 83.94 L31.52 57.65 L2 50 L31.52 42.35 L16.06 16.06 L42.35 31.52 Z" fill="currentColor"/></svg>
            Orientalische Spezialität
          </div>
          <h1 class="headline reveal">Baklava</h1>
          <p class="subline reveal">Frisch bei uns — gibt es gegenüber nicht.</p>
          <div class="price-wrap reveal">
            <span class="price">3,00&nbsp;€<span class="sheen"></span></span>
            <span class="price-caption">Großes Stück</span>
          </div>
        </div>

        <div class="photo-frame">
          <image-slot id="hero-baklava" shape="rect"
            placeholder="Baklava-Foto hier ablegen — Nahaufnahme, Honig-Glanz, warmes Licht"></image-slot>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var stage = document.getElementById('stage');
      var vp = document.getElementById('viewport');
      function fit() {
        var s = Math.min(vp.clientWidth / 1920, vp.clientHeight / 1080);
        stage.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      fit();
      // kick off the staggered entrance once layout is settled
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { stage.classList.add('play'); });
      });
    })();
  </script>
</body>
</html>
